
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HarmonyStream | Pro Downloader</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0b1220;
            --card: #131d33;
            --text: #f8fafc;
            --muted: #94a3b8;
            --border: #2a3550;
        }
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 640px;
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.4);
            border: 1px solid var(--border);
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 0.5rem; color: var(--text); font-weight: 800; letter-spacing: -0.025em; }
        p { color: var(--muted); margin-bottom: 2.5rem; font-size: 1.1rem; }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 2rem;
            position: relative;
        }
        input {
            flex: 1;
            padding: 16px 20px;
            border-radius: 12px;
            border: 2px solid var(--border);
            background: #080e1a;
            color: white;
            outline: none;
            font-size: 1rem;
            transition: all 0.2s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1); }
        button {
            padding: 16px 32px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }
        button:hover { background: var(--primary-hover); transform: translateY(-1px); }
        button:active { transform: translateY(0); }
        button:disabled { background: #334155; cursor: not-allowed; transform: none; }
        
        #result { display: none; margin-top: 2rem; text-align: left; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .video-info { display: flex; gap: 20px; margin-bottom: 2rem; background: #080e1a; padding: 16px; border-radius: 16px; border: 1px solid var(--border); }
        .video-info img { width: 160px; height: 90px; border-radius: 8px; object-fit: cover; }
        .video-info div { flex: 1; min-width: 0; }
        .video-title { font-weight: 700; font-size: 1.1rem; margin-bottom: 6px; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .video-author { color: var(--muted); font-size: 0.95rem; }

        .format-list { display: flex; flex-direction: column; gap: 10px; max-height: 320px; overflow-y: auto; padding-right: 8px; }
        .format-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1e293b;
            padding: 14px 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
            transition: border-color 0.2s;
        }
        .format-item:hover { border-color: var(--primary); }
        .format-label { font-weight: 600; font-size: 0.95rem; }
        .format-meta { color: var(--muted); font-size: 0.85rem; margin-left: 12px; }
        .dl-btn { background: #10b981; padding: 8px 16px; font-size: 0.85rem; border-radius: 8px; }
        .dl-btn:hover { background: #059669; }
        
        .error { color: #fca5a5; background: rgba(239, 68, 68, 0.15); padding: 16px; border-radius: 12px; margin-top: 1.5rem; display: none; border: 1px solid rgba(239, 68, 68, 0.2); }
        .loader { display: none; margin: 20px auto; border: 4px solid #1e293b; border-top: 4px solid var(--primary); border-radius: 50%; width: 36px; height: 36px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>HarmonyStream</h1>
        <p>Your Private High-Speed Video Gateway</p>

        <div class="input-group">
            <input type="text" id="urlInput" placeholder="Paste YouTube link here..." autocomplete="off">
            <button id="extractBtn">Analyze</button>
        </div>

        <div class="loader" id="loader"></div>
        <div class="error" id="error"></div>

        <div id="result">
            <div class="video-info">
                <img id="vThumb" src="" alt="">
                <div>
                    <span class="video-title" id="vTitle"></span>
                    <span class="video-author" id="vAuthor"></span>
                </div>
            </div>
            <div class="format-list" id="formatList"></div>
        </div>
    </div>

    <script>
        const btn = document.getElementById('extractBtn');
        const input = document.getElementById('urlInput');
        const loader = document.getElementById('loader');
        const error = document.getElementById('error');
        const result = document.getElementById('result');

        btn.onclick = async () => {
            const url = input.value.trim();
            if (!url) return;

            error.style.display = 'none';
            result.style.display = 'none';
            loader.style.display = 'block';
            btn.disabled = true;

            try {
                const response = await fetch(`/api/extract?url=${encodeURIComponent(url)}`);
                const data = await response.json();

                if (!data.success) throw new Error(data.message || data.error || 'Extraction failed.');

                document.getElementById('vThumb').src = data.thumbnail;
                document.getElementById('vTitle').innerText = data.title;
                document.getElementById('vAuthor').innerText = data.author;

                const list = document.getElementById('formatList');
                list.innerHTML = '';
                
                data.allFormats.forEach(f => {
                    const item = document.createElement('div');
                    item.className = 'format-item';
                    item.innerHTML = `
                        <div>
                            <span class="format-label">${f.quality}</span>
                            <span class="format-meta">${f.mimeType.split('/')[1].toUpperCase()} • ${f.contentLength}</span>
                        </div>
                        <button class="dl-btn" onclick="window.open('${f.url}', '_blank')">Download</button>
                    `;
                    list.appendChild(item);
                });

                result.style.display = 'block';
            } catch (err) {
                error.innerText = err.message;
                error.style.display = 'block';
            } finally {
                loader.style.display = 'none';
                btn.disabled = false;
            }
        };

        input.onkeypress = (e) => { if (e.key === 'Enter') btn.click(); };
    </script>
</body>
</html>
